version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: gst-postgres
    environment:
      POSTGRES_DB: gst_platform
      POSTGRES_USER: gst_user
      POSTGRES_PASSWORD: gst_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gst-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: gst-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  adminer:
    image: adminer
    container_name: gst-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gst-redis-commander
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

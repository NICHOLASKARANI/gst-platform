<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Enterprise Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            color: white;
            padding: 20px;
        }
        .dashboard { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,212,255,0.3);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); background: rgba(0,212,255,0.1); }
        .stat-number { font-size: 36px; font-weight: bold; color: #00d4ff; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0,212,255,0.3);
        }
        .chart-card h3 { color: #00d4ff; margin-bottom: 15px; }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #00d4ff;
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            z-index: 100;
        }
        canvas { max-height: 300px; }
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Map</a>
    
    <div class="dashboard">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> GST Enterprise Analytics</h1>
            <div id="lastUpdate"></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalSatellites">0</div><div>Total Satellites</div></div>
            <div class="stat-card"><div class="stat-number" id="activeCountries">0</div><div>Countries</div></div>
            <div class="stat-card"><div class="stat-number" id="dailyRequests">0</div><div>API Calls Today</div></div>
            <div class="stat-card"><div class="stat-number" id="enterpriseClients">0</div><div>Enterprise Clients</div></div>
        </div>
        
        <div class="chart-grid">
            <div class="chart-card"><h3>Satellites by Country</h3><canvas id="countryChart"></canvas></div>
            <div class="chart-card"><h3>Satellites by Category</h3><canvas id="categoryChart"></canvas></div>
            <div class="chart-card"><h3>Satellite Launches by Year</h3><canvas id="launchChart"></canvas></div>
            <div class="chart-card"><h3>Revenue Growth</h3><canvas id="revenueChart"></canvas></div>
        </div>
    </div>

    <script>
        async function loadSatelliteStats() {
            try {
                const response = await fetch('http://localhost:8016/api/satellites/statistics');
                const data = await response.json();
                
                document.getElementById('totalSatellites').innerHTML = data.total.toLocaleString();
                document.getElementById('activeCountries').innerHTML = Object.keys(data.byCountry || {}).length;
                document.getElementById('lastUpdate').innerHTML = Last Update: ;
                
                // Country Chart
                if (data.byCountry) {
                    const countries = Object.keys(data.byCountry);
                    const counts = Object.values(data.byCountry);
                    new Chart(document.getElementById('countryChart'), {
                        type: 'bar',
                        data: { labels: countries.slice(0, 10), datasets: [{ label: 'Satellites', data: counts.slice(0, 10), backgroundColor: '#00d4ff' }] },
                        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: 'white' } } } }
                    });
                }
                
                // Category Chart
                if (data.byCategory) {
                    new Chart(document.getElementById('categoryChart'), {
                        type: 'doughnut',
                        data: { labels: Object.keys(data.byCategory), datasets: [{ data: Object.values(data.byCategory), backgroundColor: ['#00d4ff', '#ffd700', '#ff6b6b', '#98fb98', '#dda0dd', '#ffa500'] }] },
                        options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
                    });
                }
                
            } catch (error) {
                console.log('Stats error:', error);
            }
        }
        
        // Launch chart
        new Chart(document.getElementById('launchChart'), {
            type: 'line',
            data: {
                labels: ['2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'],
                datasets: [{ label: 'Satellites Launched', data: [86, 92, 145, 218, 267, 432, 678, 1234, 1876, 2345, 2890], borderColor: '#00d4ff', fill: false }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { color: 'rgba(255,255,255,0.1)' } } } }
        });
        
        // Revenue chart
        new Chart(document.getElementById('revenueChart'), {
            type: 'line',
            data: {
                labels: ['2024', '2025', '2026', '2027', '2028', '2029', '2030'],
                datasets: [{ label: 'Projected Revenue ()', data: [0, 2.5, 25, 150, 500, 1200, 5000], borderColor: '#00ff00', fill: false }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' } }, x: { grid: { color: 'rgba(255,255,255,0.1)' } } } }
        });
        
        // Simulate real-time stats
        setInterval(() => {
            document.getElementById('dailyRequests').innerHTML = Math.floor(50000 + Math.random() * 50000).toLocaleString();
            document.getElementById('enterpriseClients').innerHTML = Math.floor(50 + Math.random() * 100);
        }, 5000);
        
        loadSatelliteStats();
    </script>
</body>
</html>

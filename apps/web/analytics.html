<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            color: white;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 { color: #00d4ff; text-align: center; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,212,255,0.3);
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #00d4ff;
        }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        canvas { max-height: 300px; }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #00d4ff;
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    
    <div class="dashboard">
        <h1><i class="fas fa-chart-pie"></i> GST Analytics Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div>Total Users</div></div>
            <div class="stat-card"><div class="stat-number" id="activeSessions">0</div><div>Active Sessions</div></div>
            <div class="stat-card"><div class="stat-number" id="apiCalls">0</div><div>API Calls Today</div></div>
            <div class="stat-card"><div class="stat-number" id="satellitesTracked">0</div><div>Satellites Tracked</div></div>
        </div>
        
        <div class="chart-container"><canvas id="usageChart"></canvas></div>
        <div class="chart-container"><canvas id="satelliteChart"></canvas></div>
    </div>

    <script>
        // Initialize charts
        const usageCtx = document.getElementById('usageChart').getContext('2d');
        new Chart(usageCtx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'API Requests',
                    data: [1250, 1890, 2100, 2450, 2980, 3100, 2890],
                    borderColor: '#00d4ff',
                    fill: false
                }]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
        
        const satCtx = document.getElementById('satelliteChart').getContext('2d');
        new Chart(satCtx, {
            type: 'doughnut',
            data: {
                labels: ['Communications', 'Navigation', 'Earth Observation', 'Scientific'],
                datasets: [{
                    data: [45, 25, 20, 10],
                    backgroundColor: ['#00d4ff', '#ffd700', '#ff6b6b', '#98fb98']
                }]
            },
            options: { responsive: true }
        });
        
        // Simulate real-time stats
        function updateStats() {
            document.getElementById('totalUsers').innerHTML = Math.floor(1000 + Math.random() * 500);
            document.getElementById('activeSessions').innerHTML = Math.floor(50 + Math.random() * 100);
            document.getElementById('apiCalls').innerHTML = Math.floor(5000 + Math.random() * 3000);
            document.getElementById('satellitesTracked').innerHTML = 1247;
        }
        
        setInterval(updateStats, 3000);
        updateStats();
    </script>
</body>
</html>

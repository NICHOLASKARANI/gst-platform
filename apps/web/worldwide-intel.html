<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Worldwide Satellite Intelligence</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00d4ff; text-align: center; }
        .search-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-box input {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .search-box button {
            padding: 15px 30px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .location-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #00d4ff;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .location-card:hover { transform: translateY(-5px); background: rgba(0,212,255,0.1); }
        .location-name { font-size: 20px; font-weight: bold; color: #00d4ff; }
        .satellite-badge {
            background: rgba(0,212,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #00d4ff;
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Map</a>
    
    <div class="container">
        <h1><i class="fas fa-satellite-dish"></i> Worldwide Satellite Intelligence</h1>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="globalSearch" placeholder="Search any city or country worldwide...">
                <button onclick="searchGlobal()"><i class="fas fa-search"></i> Search</button>
            </div>
            <div style="margin-top: 20px; font-size: 12px; color: #888;">
                🌍 Trackable Locations: Nairobi, New York, London, Tokyo, Sydney, Cape Town, Dubai, Moscow, Beijing, Paris
            </div>
        </div>
        
        <div id="globalResults" class="results-grid"></div>
    </div>

    <script>
        const locations = [
            { name: 'Nairobi', country: 'Kenya', lat: -1.286389, lon: 36.817223, population: 4750000 },
            { name: 'New York', country: 'USA', lat: 40.7128, lon: -74.0060, population: 8400000 },
            { name: 'London', country: 'UK', lat: 51.5074, lon: -0.1278, population: 8900000 },
            { name: 'Tokyo', country: 'Japan', lat: 35.6762, lon: 139.6503, population: 13900000 },
            { name: 'Sydney', country: 'Australia', lat: -33.8688, lon: 151.2093, population: 5300000 },
            { name: 'Cape Town', country: 'South Africa', lat: -33.9249, lon: 18.4241, population: 4300000 },
            { name: 'Dubai', country: 'UAE', lat: 25.2048, lon: 55.2708, population: 3300000 },
            { name: 'Moscow', country: 'Russia', lat: 55.7558, lon: 37.6173, population: 12500000 },
            { name: 'Beijing', country: 'China', lat: 39.9042, lon: 116.4074, population: 21500000 },
            { name: 'Paris', country: 'France', lat: 48.8566, lon: 2.3522, population: 2140000 }
        ];
        
        function displayLocations(locationsToShow) {
            const container = document.getElementById('globalResults');
            container.innerHTML = locationsToShow.map(loc => 
                <div class="location-card" onclick="flyToLocationOnMap(, , '')">
                    <div class="location-name">📍 </div>
                    <div>🌍 </div>
                    <div>👥 Population: </div>
                    <div>🛰️ Coordinates: °, °</div>
                    <div class="satellite-badge"><i class="fas fa-satellite"></i> Live satellite coverage available</div>
                </div>
            ).join('');
        }
        
        function searchGlobal() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const filtered = locations.filter(loc => 
                loc.name.toLowerCase().includes(query) || 
                loc.country.toLowerCase().includes(query)
            );
            displayLocations(filtered);
        }
        
        function flyToLocationOnMap(lat, lon, name) {
            // Store coordinates in localStorage to be picked up by main page
            localStorage.setItem('flyToLat', lat);
            localStorage.setItem('flyToLon', lon);
            localStorage.setItem('flyToName', name);
            window.location.href = '/';
        }
        
        // Display all locations initially
        displayLocations(locations);
    </script>
</body>
</html>
